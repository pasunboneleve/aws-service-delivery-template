name: Deploy to AWS ECS Express Mode

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ECR_REPOSITORY: ${{ vars.AWS_ECR_REPOSITORY }}
      AWS_ECS_EXPRESS_SERVICE_ARN: ${{ vars.AWS_ECS_EXPRESS_SERVICE_ARN }}
      AWS_ECS_CONTAINER_PORT: ${{ vars.AWS_ECS_CONTAINER_PORT }}

    steps:
      - name: Check configuration
        run: |
          if [ -z "${{ secrets.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "Configure the AWS_ROLE_TO_ASSUME GitHub Actions secret before running CI."
            exit 1
          fi

          if [ -z "${{ vars.AWS_REGION }}" ] || [ -z "${{ vars.AWS_ECR_REPOSITORY }}" ] || [ -z "${{ vars.AWS_ECS_CONTAINER_PORT }}" ]; then
            echo "Configure AWS_REGION, AWS_ECR_REPOSITORY, and AWS_ECS_CONTAINER_PORT GitHub Actions variables before running CI."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update ECS Express service
        env:
          IMAGE_IDENTIFIER: ${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY }}:${{ github.sha }}
          ECS_CONTAINER_PORT: ${{ env.AWS_ECS_CONTAINER_PORT }}
        run: |
          if [ -z "${ECS_CONTAINER_PORT}" ]; then
            ECS_CONTAINER_PORT=8080
          fi

          if [ -z "${AWS_ECS_EXPRESS_SERVICE_ARN}" ]; then
            echo "ECS Express service ARN is not available yet. Run tofu apply after the bootstrap image is available."
            exit 1
          fi

          STATUS=$(
            aws ecs describe-express-gateway-service \
              --service-arn "${AWS_ECS_EXPRESS_SERVICE_ARN}" \
              --query 'service.status.statusCode' \
              --output text || true
          )

          if [ "${STATUS}" = "None" ] || [ -z "${STATUS}" ]; then
            echo "ECS Express service ${AWS_ECS_EXPRESS_SERVICE_ARN} does not exist. Run tofu apply after the bootstrap image is available."
            exit 1
          fi

          aws ecs update-express-gateway-service \
            --service-arn "${AWS_ECS_EXPRESS_SERVICE_ARN}" \
            --primary-container "image=${IMAGE_IDENTIFIER},containerPort=${ECS_CONTAINER_PORT}"

      - name: Show service URL
        run: |
          aws ecs describe-express-gateway-service \
            --service-arn "${AWS_ECS_EXPRESS_SERVICE_ARN}" \
            --query "service.activeConfigurations[0].ingressPaths[?accessType=='PUBLIC'].endpoint | [0]" \
            --output text || {
              echo "ECS Express service ${AWS_ECS_EXPRESS_SERVICE_ARN} is not available. Run tofu apply after the bootstrap image is available."
              exit 1
            }
